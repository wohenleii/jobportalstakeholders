<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — JobPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="container">
    <div class="auth-card mx-auto">
      <div class="logo">Job<span>Portal</span></div>
      <p class="text-center text-muted mb-4">Sign in to your account</p>

      <div id="alertBox" class="alert d-none" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required />
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="submitBtn">
          Sign In
        </button>
      </form>

      <hr class="my-4" />
      <div class="text-center">
        <p class="mb-2 text-muted small">Staff / Admin demo accounts:</p>
        <div class="d-flex gap-2 justify-content-center flex-wrap">
          <button class="btn btn-sm btn-outline-secondary" onclick="fillDemo('admin@jobportal.com','password')">🔑 Admin</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="fillDemo('employer@techcorp.com','password')">🏢 Employer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (api.isLoggedIn()) {
    const u = api.getUser();
    if (u && u.role === 'admin') window.location.href = '/admin.html';
    else if (u && u.role === 'employer') window.location.href = '/employer.html';
    else window.location.href = '/index.html';
  }

  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.querySelector('#togglePwd i');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });

  function fillDemo(email, password) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = password;
  }

  function showAlert(msg, type = 'danger') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
    box.classList.remove('d-none');
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');

    if (!email || !password) {
      showAlert('Please fill in all fields.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

    try {
      const data = await api.login(email, password);
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => {
        if (data.user.role === 'admin') window.location.href = '/admin.html';
        else if (data.user.role === 'employer') window.location.href = '/employer.html';
        else window.location.href = '/index.html';
      }, 800);
    } catch (err) {
      showAlert(err.message || 'Login failed. Please try again.');
      btn.disabled = false;git 
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs — JobPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/index.html">Job<span>Portal</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="/jobs.html">Browse Jobs</a></li>
      </ul>
      <ul class="navbar-nav align-items-center" id="navAuth"></ul>
    </div>
  </div>
</nav>

<!-- Page Header -->
<div class="bg-primary text-white py-4">
  <div class="container">
    <h1 class="fw-bold mb-2">Browse Jobs</h1>
    <div class="input-group" style="max-width:500px">
      <input type="text" class="form-control" id="searchInput" placeholder="Search jobs, companies..." />
      <button class="btn btn-warning fw-bold" onclick="applyFilters()">
        <i class="bi bi-search"></i> Search
      </button>
    </div>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="container">
    <div class="row text-center">
      <div class="col-3 stat-item">
        <div class="number" id="statJobs">—</div>
        <div class="label">Active Jobs</div>
      </div>
      <div class="col-3 stat-item">
        <div class="number" id="statCompanies">—</div>
        <div class="label">Companies</div>
      </div>
      <div class="col-3 stat-item">
        <div class="number" id="statUsers">—</div>
        <div class="label">Job Seekers</div>
      </div>
      <div class="col-3 stat-item">
        <div class="number" id="statApps">—</div>
        <div class="label">Applications</div>
      </div>
    </div>
  </div>
</div>

<div class="container py-4">
  <div class="row g-4">

    <!-- Filters Sidebar -->
    <div class="col-lg-3">
      <div class="filter-card">
        <h6><i class="bi bi-funnel me-2"></i>Filters</h6>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Job Type</label>
          <div id="jobTypeFilters">
            <div class="form-check"><input class="form-check-input" type="checkbox" value="full-time" id="ft"><label class="form-check-label small" for="ft">Full-time</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" value="part-time" id="pt"><label class="form-check-label small" for="pt">Part-time</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" value="short-term" id="intern"><label class="form-check-label small" for="intern">Short Term Programme</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" value="contract" id="contract"><label class="form-check-label small" for="contract">Contract</label></div>
            <div class="form-check"><input class="form-check-input" type="checkbox" value="remote" id="remote"><label class="form-check-label small" for="remote">Remote</label></div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Category</label>
          <select class="form-select form-select-sm" id="categoryFilter">
            <option value="">All Categories</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Location</label>
          <input type="text" class="form-control form-control-sm" id="locationFilter" placeholder="City, state..." />
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Min Salary ($)</label>
          <input type="number" class="form-control form-control-sm" id="salaryMin" placeholder="e.g. 50000" />
        </div>

        <button class="btn btn-primary w-100 btn-sm" onclick="applyFilters()">Apply Filters</button>
        <button class="btn btn-outline-secondary w-100 btn-sm mt-2" onclick="clearFilters()">Clear All</button>
      </div>
    </div>

    <!-- Job Listings -->
    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span id="resultsCount" class="text-muted small"></span>
        <select class="form-select form-select-sm w-auto" id="sortSelect" onchange="applyFilters()">
          <option value="">Sort: Newest</option>
        </select>
      </div>

      <div id="jobsList"></div>
      <div id="pagination" class="d-flex justify-content-center mt-4"></div>
    </div>
  </div>
</div>

<!-- Job Detail Modal -->
<div class="modal fade" id="jobModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="jobModalBody">
        <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Apply Modal -->
<div class="modal fade" id="applyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Apply for Job</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="applyAlert" class="alert d-none"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Cover Letter <span class="text-muted">(optional)</span></label>
          <textarea class="form-control" id="coverLetter" rows="5" placeholder="Tell the employer why you're a great fit..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary fw-bold" id="submitApplyBtn" onclick="submitApplication()">Submit Application</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  updateNavAuth();

  let currentPage = 1;
  let currentJobId = null;

  // Read URL params on load
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('search')) document.getElementById('searchInput').value = urlParams.get('search');
  if (urlParams.get('category')) {
    // Will be set after categories load
  }
  if (urlParams.get('id')) {
    openJobModal(urlParams.get('id'));
  }

  async function loadCategories() {
    try {
      const data = await api.getCategories();
      const sel = document.getElementById('categoryFilter');
      data.categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        if (urlParams.get('category') === cat) opt.selected = true;
        sel.appendChild(opt);
      });
    } catch (_) {}
  }

  function getFilters() {
    const types = [...document.querySelectorAll('#jobTypeFilters input:checked')].map(i => i.value);
    return {
      search: document.getElementById('searchInput').value.trim(),
      job_type: types.join(','),
      category: document.getElementById('categoryFilter').value,
      location: document.getElementById('locationFilter').value.trim(),
      salary_min: document.getElementById('salaryMin').value,
      page: currentPage,
      limit: 10,
    };
  }

  function applyFilters() {
    currentPage = 1;
    loadJobs();
  }

  function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('categoryFilter').value = '';
    document.getElementById('locationFilter').value = '';
    document.getElementById('salaryMin').value = '';
    document.querySelectorAll('#jobTypeFilters input').forEach(i => i.checked = false);
    applyFilters();
  }

  async function loadJobs() {
    const container = document.getElementById('jobsList');
    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

    try {
      const filters = getFilters();
      // Remove empty values
      Object.keys(filters).forEach(k => !filters[k] && delete filters[k]);
      const data = await api.getJobs(filters);

      document.getElementById('resultsCount').textContent =
        `${data.pagination.total} job${data.pagination.total !== 1 ? 's' : ''} found`;

      if (!data.jobs.length) {
        container.innerHTML = `
          <div class="text-center py-5">
            <div style="font-size:4rem">🔍</div>
            <h5 class="mt-3">No jobs found</h5>
            <p class="text-muted">Try adjusting your search or filters.</p>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      container.innerHTML = data.jobs.map(job => `
        <div class="job-card mb-3">
          <button class="bookmark-btn ${api.isLoggedIn() ? '' : 'd-none'}" onclick="toggleBookmark(event, ${job.id}, this)" data-job-id="${job.id}">
            <i class="bi bi-bookmark"></i>
          </button>
          <div class="d-flex align-items-start gap-3">
            <div class="company-logo-placeholder flex-shrink-0">${job.company_name.charAt(0)}</div>
            <div class="flex-grow-1">
              <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
                <div>
                  <a href="#" class="job-title" onclick="openJobModal(${job.id}); return false;">${job.title}</a>
                  <div class="company-name mt-1">${job.company_name} · <i class="bi bi-geo-alt"></i> ${job.location}</div>
                </div>
                <div class="text-end">
                  <div class="fw-semibold text-success small">${formatSalary(job.salary_min, job.salary_max)}</div>
                  <div class="text-muted small">${timeAgo(job.created_at)}</div>
                </div>
              </div>
              <div class="d-flex flex-wrap gap-2 mt-2">
                <span class="badge-type ${badgeClass(job.job_type)}">${job.job_type}</span>
                ${job.category ? `<span class="badge bg-light text-secondary">${job.category}</span>` : ''}
                <span class="badge bg-light text-secondary"><i class="bi bi-eye"></i> ${job.views} views</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      renderPagination(data.pagination);
    } catch (err) {
      container.innerHTML = `<div class="alert alert-danger">Failed to load jobs: ${err.message}</div>`;
    }
  }

  function renderPagination({ page, pages }) {
    if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '<nav><ul class="pagination">';
    html += `<li class="page-item ${page === 1 ? 'disabled' : ''}">
      <a class="page-link" href="#" onclick="goPage(${page-1});return false;">‹</a></li>`;
    for (let i = 1; i <= pages; i++) {
      html += `<li class="page-item ${i === page ? 'active' : ''}">
        <a class="page-link" href="#" onclick="goPage(${i});return false;">${i}</a></li>`;
    }
    html += `<li class="page-item ${page === pages ? 'disabled' : ''}">
      <a class="page-link" href="#" onclick="goPage(${page+1});return false;">›</a></li>`;
    html += '</ul></nav>';
    document.getElementById('pagination').innerHTML = html;
  }

  function goPage(p) {
    currentPage = p;
    loadJobs();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function openJobModal(jobId) {
    currentJobId = jobId;
    const modal = new bootstrap.Modal(document.getElementById('jobModal'));
    document.getElementById('jobModalBody').innerHTML =
      '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
    modal.show();

    try {
      const data = await api.getJob(jobId);
      const job = data.job;
      const user = api.getUser();
      const canApply = user && user.role === 'student';

      document.getElementById('jobModalBody').innerHTML = `
        <div class="d-flex align-items-start gap-3 mb-4">
          <div class="company-logo-placeholder" style="width:64px;height:64px;font-size:1.5rem">${job.company_name.charAt(0)}</div>
          <div>
            <h4 class="fw-bold mb-1">${job.title}</h4>
            <div class="text-muted">${job.company_name}</div>
            <div class="d-flex flex-wrap gap-2 mt-2">
              <span class="badge-type ${badgeClass(job.job_type)}">${job.job_type}</span>
              <span class="badge bg-light text-secondary"><i class="bi bi-geo-alt"></i> ${job.location}</span>
              ${job.category ? `<span class="badge bg-light text-secondary">${job.category}</span>` : ''}
            </div>
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-sm-6">
            <div class="p-3 bg-light rounded-3">
              <div class="small text-muted">Salary</div>
              <div class="fw-semibold text-success">${formatSalary(job.salary_min, job.salary_max)}</div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="p-3 bg-light rounded-3">
              <div class="small text-muted">Deadline</div>
              <div class="fw-semibold">${job.deadline ? new Date(job.deadline).toLocaleDateString() : 'Open'}</div>
            </div>
          </div>
        </div>

        <h6 class="fw-bold">Job Description</h6>
        <p class="text-muted">${job.description}</p>

        ${job.requirements ? `<h6 class="fw-bold mt-3">Requirements</h6><p class="text-muted">${job.requirements}</p>` : ''}

        <h6 class="fw-bold mt-3">About ${job.company_name}</h6>
        <p class="text-muted">${job.company_description || 'No company description available.'}</p>

        <div class="d-flex gap-2 mt-4">
          ${canApply ? `<button class="btn btn-primary fw-bold" onclick="openApplyModal()">Apply Now</button>` : ''}
          ${!user ? `<a href="/login.html" class="btn btn-primary fw-bold">Login to Apply</a>` : ''}
          ${user && api.isLoggedIn() ? `
            <button class="btn btn-outline-warning" onclick="toggleBookmark(event, ${job.id}, this)">
              <i class="bi bi-bookmark"></i> Bookmark
            </button>` : ''}
        </div>
      `;
    } catch (err) {
      document.getElementById('jobModalBody').innerHTML =
        `<div class="alert alert-danger">Failed to load job details.</div>`;
    }
  }

  function openApplyModal() {
    bootstrap.Modal.getInstance(document.getElementById('jobModal')).hide();
    setTimeout(() => new bootstrap.Modal(document.getElementById('applyModal')).show(), 300);
  }

  async function submitApplication() {
    if (!api.isLoggedIn()) { window.location.href = '/login.html'; return; }
    const coverLetter = document.getElementById('coverLetter').value;
    const btn = document.getElementById('submitApplyBtn');
    const alertEl = document.getElementById('applyAlert');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';

    try {
      await api.applyJob(currentJobId, coverLetter);
      alertEl.className = 'alert alert-success';
      alertEl.textContent = '✅ Application submitted successfully!';
      alertEl.classList.remove('d-none');
      btn.textContent = 'Applied!';
      setTimeout(() => bootstrap.Modal.getInstance(document.getElementById('applyModal')).hide(), 2000);
    } catch (err) {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = err.message;
      alertEl.classList.remove('d-none');
      btn.disabled = false;
      btn.textContent = 'Submit Application';
    }
  }

  async function toggleBookmark(e, jobId, btn) {
    e.stopPropagation();
    if (!api.isLoggedIn()) { window.location.href = '/login.html'; return; }
    const icon = btn.querySelector('i') || btn;
    const isBookmarked = icon.classList.contains('bi-bookmark-fill');

    try {
      if (isBookmarked) {
        await api.removeBookmark(jobId);
        icon.className = 'bi bi-bookmark';
        btn.classList.remove('active');
        showToast('Bookmark removed', 'info');
      } else {
        await api.addBookmark(jobId);
        icon.className = 'bi bi-bookmark-fill';
        btn.classList.add('active');
        showToast('Job bookmarked!', 'success');
      }
    } catch (err) {
      showToast(err.message, 'danger');
    }
  }

  // Init
  loadCategories();
  loadJobs();
  async function loadStats() {
    try {
      const data = await api.getAdminStats();
      document.getElementById('statJobs').textContent = data.stats.activeJobs;
      document.getElementById('statCompanies').textContent = data.stats.totalEmployers;
      document.getElementById('statUsers').textContent = data.stats.totalUsers;
      document.getElementById('statApps').textContent = data.stats.totalApplications;
    } catch (_) {}
  }
  loadStats();

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilters();
  });
</script>
</body>
</html>

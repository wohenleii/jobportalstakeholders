<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Registration — JobPortal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="container py-4">
    <div class="auth-card mx-auto" style="max-width:500px">
      <div class="logo">Job<span>Portal</span></div>
      <p class="text-center text-muted mb-4">Create an employer account</p>

      <div id="alertBox" class="alert d-none" role="alert"></div>

      <form id="registerForm" novalidate>
        <input type="hidden" id="role" value="employer" />

        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" id="name" placeholder="John Doe" required />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <input type="email" class="form-control" id="email" placeholder="you@company.com" required />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Company Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="company_name" placeholder="Acme Corp" required />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" required />
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required />
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="submitBtn">
          Create Employer Account
        </button>
      </form>

      <p class="text-center mt-3 mb-0">
        Already have an account? <a href="/login.html" class="text-primary fw-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
  if (api.isLoggedIn()) {
    const u = api.getUser();
    if (u && u.role === 'employer') window.location.href = '/employer.html';
    else if (u && u.role === 'admin') window.location.href = '/admin.html';
    else window.location.href = '/index.html';
  }

  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.querySelector('#togglePwd i');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
  });

  function showAlert(msg, type = 'danger') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
    box.classList.remove('d-none');
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const company_name = document.getElementById('company_name').value.trim();
    const btn = document.getElementById('submitBtn');

    if (!name || !email || !password || !company_name) {
      showAlert('Please fill in all required fields.');
      return;
    }
    if (password.length < 6) {
      showAlert('Password must be at least 6 characters.');
      return;
    }
    if (password !== confirmPassword) {
      showAlert('Passwords do not match.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

    try {
      await api.register({ name, email, password, role: 'employer', company_name });
      showAlert('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = '/employer.html', 1000);
    } catch (err) {
      showAlert(err.message || 'Registration failed.');
      btn.disabled = false;
      btn.textContent = 'Create Employer Account';
    }
  });
</script>
</body>
</html>
